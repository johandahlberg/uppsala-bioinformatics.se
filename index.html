<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johan Dahlberg</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><line x1='50' y1='45' x2='25' y2='25' stroke='%23555' stroke-width='6'/><line x1='50' y1='45' x2='75' y2='30' stroke='%23555' stroke-width='6'/><line x1='50' y1='45' x2='15' y2='60' stroke='%23555' stroke-width='6'/><line x1='50' y1='45' x2='55' y2='85' stroke='%23555' stroke-width='6'/><line x1='50' y1='45' x2='30' y2='80' stroke='%23555' stroke-width='6'/><line x1='25' y1='25' x2='15' y2='60' stroke='%23555' stroke-width='6'/><line x1='75' y1='30' x2='85' y2='70' stroke='%23555' stroke-width='6'/><line x1='75' y1='30' x2='90' y2='15' stroke='%23555' stroke-width='6'/><line x1='15' y1='60' x2='30' y2='80' stroke='%23555' stroke-width='6'/><line x1='85' y1='70' x2='55' y2='85' stroke='%23555' stroke-width='6'/><line x1='55' y1='85' x2='30' y2='80' stroke='%23555' stroke-width='6'/><circle cx='50' cy='45' r='10' fill='%23ff4444'/><circle cx='25' cy='25' r='10' fill='black'/><circle cx='75' cy='30' r='10' fill='black'/><circle cx='15' cy='60' r='10' fill='black'/><circle cx='85' cy='70' r='10' fill='black'/><circle cx='55' cy='85' r='10' fill='black'/><circle cx='90' cy='15' r='10' fill='black'/><circle cx='30' cy='80' r='10' fill='black'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .viz-box {
            position: relative;
            width: 320px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            overflow: hidden; 
        }

        #networkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .name {
            font-size: 18px;
            margin: 0 0 5px 0;
            font-weight: normal;
        }

        .tagline {
            font-size: 16px;
            margin: 0 0 30px 0;
        }
        
        .socials {
            display: flex;
            gap: 20px; 
            font-size: 24px; 
        }

        .socials a {
            text-decoration: none;
            color: #666; 
            transition: color 0.2s ease, transform 0.2s ease; 
        }

        .socials a:hover {
            color: #000; 
            transform: translateY(-3px); 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="viz-box">
            <canvas id="networkCanvas"></canvas>
        </div>
        
        <h1 class="name">Johan Dahlberg</h1>
        <p class="tagline">Software | Science | Solutions</p>
        
        <div class="socials">
            <a href="https://www.linkedin.com/in/johan-dahlberg/" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/johandahlberg" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://scholar.google.se/citations?user=BHRLQaoAAAAJ&hl=en" aria-label="Google Scholar"><i class="fas fa-vial"></i></a>
            <a href="mailto:johan@uppsala-bioinformatics.se" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const particlesArray = [];
        const numParticles = 33; 
        let animationId; 

        class Particle {
            constructor(index) {
                const speedFactor = 0.45;
                const scale = 0.80; 
                
                const offsetX = (canvas.width * (1 - scale)) / 2;
                const offsetY = (canvas.height * (1 - scale)) / 2;

                this.x = offsetX + (Math.random() * (canvas.width * scale));
                this.y = offsetY + (Math.random() * (canvas.height * scale));

                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * speedFactor - 0.25; 
                this.speedY = Math.random() * speedFactor - 0.25;
                this.isRed = (index % 5 === 0);
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                const boundaryOffset = this.size + 2; 

                if (this.x < boundaryOffset || this.x > canvas.width - boundaryOffset) {
                    this.speedX *= -1;
                }
                if (this.y < boundaryOffset || this.y > canvas.height - boundaryOffset) {
                    this.speedY *= -1;
                }
            }
            draw() {
                if (this.isRed) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
                } else {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numParticles; i++) {
                particlesArray.push(new Particle(i));
            }
        }

        function handleParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 60) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 0, 0, ${1 - distance/60})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            animationId = requestAnimationFrame(animate);
        }

        init();
        animate();


    </script>
</body>
</html>
